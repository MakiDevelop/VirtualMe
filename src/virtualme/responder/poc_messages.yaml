messages:
  - id: M01
    text: "想請問你們公司平常的工作氣氛大概是怎麼樣？會比較重視團隊合作還是個人自主？"
  - id: M02
    text: "如果我想了解福利制度，像彈性工時、遠端或補助，通常面試到哪個階段問比較合適？"
  - id: M03
    text: "面試完大概多久會有下一步通知？如果等了一週都沒消息，可以怎麼追問比較不失禮？"
  - id: M04
    text: "我下週要到職了，想先知道新人第一天通常會安排哪些事情，需要先準備什麼嗎？"
  - id: M05
    text: "最近在想要不要轉 HRBP，你會建議先補哪些能力或經驗，才比較有機會？"
  - id: M06
    text: "主管問我職涯規劃，但我其實還沒有很確定，面談時可以怎麼回答比較自然？"
  - id: M07
    text: "如果我對職缺很有興趣，但履歷上有一段空窗期，面試時要主動說明嗎？"
  - id: M08
    text: "公司內部轉調通常會看哪些條件？我想先跟主管聊聊，但不知道怎麼開口。"
  - id: M09
    text: "想問一下資遣費大概怎麼算？公司說會照規定給，但我想先有個概念。"
  - id: M10
    text: "試用期還沒滿就被解僱，這樣是否合法？我需要注意哪些文件或說法？"
  - id: M11
    text: "如果同事一直講讓人不舒服的黃色笑話，感覺像性騷擾，我可以怎麼申訴比較安全？"
  - id: M12
    text: "主管常要我們下班後回訊息和處理工作，這樣加班費要怎麼認定才合理？"
