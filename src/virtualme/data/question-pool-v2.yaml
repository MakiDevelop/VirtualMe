version: 2
status: draft
source:
  - Perplexity Max interview design handbook
  - SuperGrok product flow review

meta:
  target_questions_per_dimension: 8
  target_total_questions: 64
  intake_questions: 5
  default_follow_up_max: 2
  production_enabled: false

intake:
  purpose: "在正式萃取前校準受訪者領域，避免後續題目過於泛用或 placeholder 外洩。"
  completion_rule: "取得 domain_role、core_task、primary_counterparty、decision_partner；如果使用者不想定義，可先用 broad mode。"
  questions:
    - id: intake_01_domain
      text: "在開始前，我想先知道你的主要領域或角色。你會怎麼介紹自己現在主要在做什麼？"
      captures: [domain_role]
      user_explain: "這會讓後面的問題更貼近你的工作與生活脈絡。"
      follow_up_max: 1
      stop_condition: "得到一個角色或領域描述。"
      risk_level: low
    - id: intake_02_core_task
      text: "你最常反覆處理的核心工作或決策是什麼？"
      captures: [core_task]
      user_explain: "我會用這個校準後面的 SKILL 題，不會問得太泛。"
      follow_up_max: 1
      stop_condition: "得到一個主要工作流程或決策類型。"
      risk_level: low
    - id: intake_03_counterparty
      text: "你平常最常跟哪些人互動？例如同事、客戶、主管、部屬、合作夥伴或社群朋友。"
      captures: [primary_counterparty, counterparty]
      user_explain: "這會讓 PEOPLE 和 VOICE 題更像真實情境。"
      follow_up_max: 1
      stop_condition: "得到 1-3 種常見互動對象。"
      risk_level: low
    - id: intake_04_decision_partner
      text: "你通常跟誰討論範圍、優先順序、預算、時程或取捨？"
      captures: [decision_partner]
      user_explain: "這能幫我理解你做決策時真正需要協調的人。"
      follow_up_max: 1
      stop_condition: "得到一種決策協調對象；若沒有，標記為 mostly_self_decided。"
      risk_level: low
    - id: intake_05_use_case
      text: "你希望 VirtualMe 之後主要幫你做什麼？回訊息、整理想法、替你判斷事情，還是別的？"
      captures: [virtualme_use_case]
      user_explain: "這會影響我優先萃取語氣、判斷邏輯，還是工作方法。"
      follow_up_max: 1
      stop_condition: "得到一個主要 use case。"
      risk_level: low

dimensions:
  STATE:
    name: "近況"
    purpose: "當前優先級、近期壓力源、能量分佈、最近改變了什麼想法。"
    avoid: "不要把短期狀態當成長期人格定論。"
    completion_threshold: 75
  HISTORY:
    name: "人生歷程"
    purpose: "轉折點、決定性事件、長期習慣的形成原因、困難中的行動選擇。"
    avoid: "不要蒐集無詮釋的履歷流水帳。"
    completion_threshold: 80
  SOUL:
    name: "靈魂・核心價值"
    purpose: "核心信念、人生判準、行動背後的理由、重複出現的價值取捨。"
    avoid: "不要收集沒有行為錨點的抽象自我標籤。"
    completion_threshold: 85
  PEOPLE:
    name: "人際關係"
    purpose: "信任建立機制、合作偏好、影響圈、關係中的期待與退出條件。"
    avoid: "不要引導使用者八卦或評斷他人。"
    completion_threshold: 80
  SKILL:
    name: "專業技能"
    purpose: "可複製的工作流程、決策依據、工具偏好、實作與學習方法。"
    avoid: "不要只收履歷式技能清單。"
    completion_threshold: 80
  JOURNAL:
    name: "反思札記"
    purpose: "反思頻率與深度、失敗消化方式、自我敘事與自我修正模式。"
    avoid: "不要做心理治療或追問創傷細節。"
    completion_threshold: 75
  BOUNDARIES:
    name: "界線・原則"
    purpose: "不可接受線、拒絕方式、授權範圍、原則在壓力下如何維持。"
    avoid: "不要收集政治正確但無行為依據的宣稱。"
    completion_threshold: 85
  VOICE:
    name: "語氣・表達"
    purpose: "說話節奏、慣用詞、訊息風格、衝突時表達、什麼話不會說。"
    avoid: "不要只收使用者刻意表演的形象語氣。"
    completion_threshold: 85

progress_prompts:
  p00_20: "我們剛起步，不用一次說完。今天我會一次只問一題，隨時可以停。"
  p20_50: "我們已經有一些脈絡了，接下來會慢慢補你怎麼判斷、怎麼做事。"
  p50_80: "已經過半了。後面會比較像在補你的思考模式和界線，可以說多說少。"
  p80_95: "快到了，剩下是幾個缺口和說話風格樣本。"
  p95_plus: "基本上都聊完了，最後會請你看哪些描述不像你。"

transitions:
  STATE_to_HISTORY: "我對你現在的狀態有初步感覺了。接下來想往前一點，理解你是怎麼走到現在。"
  HISTORY_to_SOUL: "剛才的歷程裡有一些選擇很關鍵。接下來我想補你做選擇背後的判準。"
  SOUL_to_PEOPLE: "你的價值判準比較清楚了。下一塊我想看它怎麼出現在你跟人的互動裡。"
  PEOPLE_to_SKILL: "人際合作的模式有輪廓了。接下來我想看你實際怎麼做事、怎麼解題。"
  SKILL_to_JOURNAL: "你的工作方法我抓到一些了。下一段想了解你事後怎麼復盤和修正。"
  JOURNAL_to_BOUNDARIES: "反思方式聊完後，我想補你的界線：哪些事你會拒絕或不授權。"
  BOUNDARIES_to_VOICE: "界線清楚後，最後要收的是你實際會怎麼說，讓 VirtualMe 回覆更像你。"
  skip: "這個方向我們先放著。不是每題都一定要聊，我們直接換下一個比較適合的部分。"

questions:
  - id: state_01
    dimension: STATE
    stage: warmup
    text: "最近這陣子生活過得怎麼樣？有什麼事讓你特別有動力，或是有點壓力？"
    purpose: "捕捉當前情緒、壓力源、能量來源與短期目標。"
    user_explain: "我想先從你現在的狀態開始，這樣 VirtualMe 回覆時比較貼近你目前的感受。"
    expected_anchor: fact
    acceptable_answers: [daily_story, emotion, concrete_example]
    follow_ups:
      - "它最近大概佔了你多少心力？"
      - "你通常怎麼處理這種狀態？"
    follow_up_max: 2
    stop_condition: "取得 1-2 個具體事項與感受，或使用者想換話題。"
    risk_level: low
    optional: false
  - id: state_02
    dimension: STATE
    stage: warmup
    text: "目前你最想完成的 1-2 個目標是什麼？為什麼現在對你重要？"
    purpose: "萃取短期目標與動機優先序。"
    user_explain: "這能讓 VirtualMe 知道你現在最在意什麼，做判斷時比較不會偏掉。"
    expected_anchor: fact
    acceptable_answers: [goal, reason]
    follow_ups:
      - "如果只能先推一件，你會選哪一件？"
      - "這件事卡住的主要原因是什麼？"
    follow_up_max: 2
    stop_condition: "有明確目標與理由。"
    risk_level: low
    optional: false
  - id: state_03
    dimension: STATE
    stage: warmup
    text: "這陣子最讓你感到放鬆或有趣的事情是什麼？"
    purpose: "捕捉恢復能量方式與近期興趣。"
    user_explain: "我想知道你怎麼充電，這會影響 VirtualMe 的語氣和建議方向。"
    expected_anchor: fact
    acceptable_answers: [activity, interest]
    follow_ups:
      - "它讓你放鬆的是哪一個部分？"
    follow_up_max: 1
    stop_condition: "有具體活動或明確表示不想多說。"
    risk_level: low
    optional: false
  - id: state_04
    dimension: STATE
    stage: warmup
    text: "最近有什麼事讓你覺得「還好有做這件事」？"
    purpose: "連結當前成就感與正向動機來源。"
    user_explain: "這題是想抓你最近覺得值得的事情。"
    expected_anchor: fact
    acceptable_answers: [story, feeling]
    follow_ups:
      - "如果沒做，現在會有什麼不同？"
      - "它讓你對自己多理解了什麼？"
    follow_up_max: 2
    stop_condition: "有事件與價值感連結。"
    risk_level: low
    optional: false
  - id: state_05
    dimension: STATE
    stage: warmup
    text: "如果下個月你只能改善一件事，你會想先改善什麼？"
    purpose: "萃取當前瓶頸與短期期待。"
    user_explain: "這能讓 VirtualMe 知道你近期最想往哪裡調整。"
    expected_anchor: fact
    acceptable_answers: [plan, bottleneck]
    follow_ups:
      - "它現在為什麼還沒解決？"
    follow_up_max: 1
    stop_condition: "說出一件事與原因。"
    risk_level: low
    optional: false
  - id: state_06
    dimension: STATE
    stage: warmup
    text: "最近你最常分心想的事情是什麼？"
    purpose: "捕捉目前認知負荷與隱性壓力。"
    user_explain: "這不是要分析你，只是想知道最近什麼事情最佔腦容量。"
    expected_anchor: fact
    acceptable_answers: [concern, recurring_thought]
    follow_ups:
      - "它通常在什麼時候冒出來？"
    follow_up_max: 1
    stop_condition: "取得一個反覆出現的念頭或使用者跳過。"
    risk_level: medium
    optional: true
  - id: state_07
    dimension: STATE
    stage: warmup
    text: "最近有沒有什麼事情改變了你的想法或習慣？"
    purpose: "萃取近期認知更新。"
    user_explain: "近期改變會讓 VirtualMe 不只像過去的你，也比較像現在的你。"
    expected_anchor: pattern
    acceptable_answers: [change, trigger]
    follow_ups:
      - "這個改變是你主動選的，還是被情境推著走？"
    follow_up_max: 1
    stop_condition: "有具體改變與觸發原因。"
    risk_level: low
    optional: false
  - id: state_08
    dimension: STATE
    stage: warmup
    text: "如果用一個天氣或電量形容你最近的狀態，會是什麼？"
    purpose: "低壓取得能量狀態與自我感受。"
    user_explain: "這題比較輕鬆，讓我抓你現在大概是滿電、中電還是低電。"
    expected_anchor: fact
    acceptable_answers: [metaphor, energy_level]
    follow_ups:
      - "是什麼讓它變成這個狀態？"
    follow_up_max: 1
    stop_condition: "有比喻或能量描述。"
    risk_level: low
    optional: false

  - id: history_01
    dimension: HISTORY
    stage: timeline
    text: "可以簡單分享一下你是怎麼一步步走到現在這個職涯或生活階段的嗎？"
    purpose: "建立人生與職涯時間線。"
    user_explain: "我想先聽你的故事，這樣 VirtualMe 才知道你是怎麼形成現在的樣子。"
    expected_anchor: fact
    acceptable_answers: [timeline, turning_point]
    follow_ups:
      - "其中哪一段最不像你原本預期？"
      - "哪一個選擇最關鍵？"
    follow_up_max: 2
    stop_condition: "出現 2-3 個主要階段。"
    risk_level: low
    optional: false
  - id: history_02
    dimension: HISTORY
    stage: timeline
    text: "你職涯中有沒有某個轉捩點，讓你走上一條不同的路？"
    purpose: "萃取 life turning point 與選擇邏輯。"
    user_explain: "轉捩點通常會留下很穩定的判斷模式。"
    expected_anchor: fact
    acceptable_answers: [incident, choice]
    follow_ups:
      - "如果當時選了另一條路，你覺得現在會在哪裡？"
      - "那次之後，你判斷事情有變嗎？"
    follow_up_max: 2
    stop_condition: "描述事件、選擇與後續影響。"
    risk_level: low
    optional: false
  - id: history_03
    dimension: HISTORY
    stage: timeline
    text: "你什麼時候第一次覺得「我知道自己在做什麼了」？"
    purpose: "找能力自信形成時刻。"
    user_explain: "這能幫我理解你怎麼建立自信。"
    expected_anchor: fact
    acceptable_answers: [moment, confidence_signal]
    follow_ups:
      - "是什麼讓你有這種感覺？"
    follow_up_max: 1
    stop_condition: "有具體情境與感覺來源。"
    risk_level: low
    optional: false
  - id: history_04
    dimension: HISTORY
    stage: timeline
    text: "有沒有某個決定，你當初覺得在賭，但後來證明賭對了？"
    purpose: "萃取風險偏好與直覺信任。"
    user_explain: "我想看你在不確定時怎麼下注。"
    expected_anchor: pattern
    acceptable_answers: [risk, decision, result]
    follow_ups:
      - "當時你看見了什麼別人沒看見的訊號？"
      - "你現在還會做同樣決定嗎？"
    follow_up_max: 2
    stop_condition: "有風險、判斷依據與結果。"
    risk_level: low
    optional: false
  - id: history_05
    dimension: HISTORY
    stage: timeline
    text: "你人生或工作中最艱難的一段時期是什麼？你那時候怎麼撐過去的？"
    purpose: "萃取逆境因應模式。"
    user_explain: "如果你願意說，這能幫我理解你遇到壓力時真正會怎麼做。"
    expected_anchor: pattern
    acceptable_answers: [hard_time, coping]
    follow_ups:
      - "那段時間結束後，你有什麼不一樣？"
    follow_up_max: 1
    stop_condition: "說出因應方式；若涉及創傷或不願說，立即跳過。"
    risk_level: high
    optional: true
  - id: history_06
    dimension: HISTORY
    stage: timeline
    text: "有沒有某個人，在你不知不覺中改變了你的方向？"
    purpose: "找隱性影響者與學習來源。"
    user_explain: "影響你的人，通常也會影響你後來怎麼看人和做選擇。"
    expected_anchor: fact
    acceptable_answers: [person, influence]
    follow_ups:
      - "他影響你的是想法、做法，還是價值觀？"
    follow_up_max: 1
    stop_condition: "說出影響機制。"
    risk_level: low
    optional: false
  - id: history_07
    dimension: HISTORY
    stage: timeline
    text: "如果五年前的你看到現在的你，最驚訝的會是什麼？"
    purpose: "萃取自我變化與長期敘事。"
    user_explain: "這題是想看你覺得自己哪裡真的變了。"
    expected_anchor: pattern
    acceptable_answers: [self_change, surprise]
    follow_ups:
      - "這個變化是你主動選的，還是被環境推著走？"
    follow_up_max: 1
    stop_condition: "指出一個變化與原因。"
    risk_level: low
    optional: false
  - id: history_08
    dimension: HISTORY
    stage: timeline
    text: "有沒有哪個你曾經後悔的專業決定，後來反而變成重要教訓？"
    purpose: "萃取錯誤後的學習與判斷修正。"
    user_explain: "不是要檢討你，是想知道你怎麼從錯誤裡調整判斷。"
    expected_anchor: principle
    acceptable_answers: [mistake, lesson]
    follow_ups:
      - "如果重來一次，你會用什麼標準判斷？"
    follow_up_max: 1
    stop_condition: "有教訓或使用者不想談。"
    risk_level: medium
    optional: true

  - id: soul_01
    dimension: SOUL
    stage: depth
    text: "你做過最不划算、但還是覺得應該做的決定是什麼？"
    purpose: "萃取在代價下仍守住的價值。"
    user_explain: "這題能看出什麼東西對你來說比效率或利益更重要。"
    expected_anchor: principle
    acceptable_answers: [decision, tradeoff, reason]
    follow_ups:
      - "為什麼那時候還是覺得值得？"
      - "現在回頭看，你會改變嗎？"
    follow_up_max: 2
    stop_condition: "說明值得付出的理由。"
    risk_level: low
    optional: false
  - id: soul_02
    dimension: SOUL
    stage: depth
    text: "你什麼時候會覺得「這件事我沒辦法妥協」？"
    purpose: "萃取非協商性原則。"
    user_explain: "這能讓 VirtualMe 知道哪些地方不能替你退讓。"
    expected_anchor: principle
    acceptable_answers: [boundary, reason]
    follow_ups:
      - "上次發生是什麼情境？"
      - "如果對方繼續施壓，你會怎麼做？"
    follow_up_max: 2
    stop_condition: "有具體情境與理由。"
    risk_level: medium
    optional: false
  - id: soul_03
    dimension: SOUL
    stage: depth
    text: "你怎麼判斷一件事值得你花時間？"
    purpose: "萃取資源分配底層邏輯。"
    user_explain: "這會影響 VirtualMe 幫你排序事情時的判準。"
    expected_anchor: principle
    acceptable_answers: [criteria, example]
    follow_ups:
      - "最近一次用這個標準做判斷是什麼時候？"
    follow_up_max: 1
    stop_condition: "給出可重複判斷框架。"
    risk_level: low
    optional: false
  - id: soul_04
    dimension: SOUL
    stage: depth
    text: "有沒有某個信念，你以前很相信，但現在已經放棄或修正了？"
    purpose: "萃取信念演化與可塑性。"
    user_explain: "這能讓 VirtualMe 不只記住你相信什麼，也知道你怎麼改變想法。"
    expected_anchor: pattern
    acceptable_answers: [belief_change, trigger]
    follow_ups:
      - "是什麼讓你改變？"
      - "改變後你做事有什麼不同？"
    follow_up_max: 2
    stop_condition: "說出具體轉變原因。"
    risk_level: medium
    optional: false
  - id: soul_05
    dimension: SOUL
    stage: depth
    text: "什麼樣的人或事會讓你打從心底佩服？"
    purpose: "用投射方式萃取隱性價值觀。"
    user_explain: "你佩服什麼，通常也透露你重視什麼。"
    expected_anchor: pattern
    acceptable_answers: [admiration, traits]
    follow_ups:
      - "你自己在哪些地方也有這個特質？"
    follow_up_max: 1
    stop_condition: "出現兩個以上特質。"
    risk_level: low
    optional: false
  - id: soul_06
    dimension: SOUL
    stage: depth
    text: "如果有人說你做事太堅持或太死板，你會怎麼回應？"
    purpose: "萃取自我認知、價值防衛與例外條件。"
    user_explain: "這題是想看你怎麼看待自己的堅持。"
    expected_anchor: pattern
    acceptable_answers: [reaction, self_view]
    follow_ups:
      - "你覺得這評價公平嗎？"
    follow_up_max: 1
    stop_condition: "有真實回應或自我評估。"
    risk_level: medium
    optional: true
  - id: soul_07
    dimension: SOUL
    stage: depth
    text: "最近有什麼事讓你覺得「這才是我想要的人生」？"
    purpose: "萃取滿足感來源與人生方向。"
    user_explain: "我想知道什麼狀態最像你想活成的樣子。"
    expected_anchor: principle
    acceptable_answers: [story, value]
    follow_ups:
      - "它滿足的是你哪一個需求？"
    follow_up_max: 1
    stop_condition: "有具體事件與價值。"
    risk_level: low
